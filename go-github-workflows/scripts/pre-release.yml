name: Pre-release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: master

permissions:
  contents: write

env:
  BINARY_NAME: myservice

jobs:
  prepare:
    name: Generate Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Generate pre-release tag
        id: tag
        run: |
          BRANCH="${{ inputs.branch }}"
          SANITIZED=$(echo "$BRANCH" | sed 's|[^a-zA-Z0-9]|-|g' | sed 's|-\+|-|g' | sed 's|^-||;s|-$||')
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
          TAG="v0.0.0-${SANITIZED}.${TIMESTAMP}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=0.0.0-${SANITIZED}.${TIMESTAMP}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: prepare

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: jdx/mise-action@v3

      - name: Build release binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -trimpath \
            -o "build/${{ env.BINARY_NAME }}-${GOOS}-${GOARCH}${EXT}" .

      - name: Compress and generate checksum
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd build
          ARTIFACT="${{ env.BINARY_NAME }}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${ARTIFACT}.zip" "${ARTIFACT}.exe"
            sha256sum "${ARTIFACT}.zip" > "${ARTIFACT}.zip.sha256"
          else
            xz -z -9 "${ARTIFACT}"
            sha256sum "${ARTIFACT}.xz" > "${ARTIFACT}.xz.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            build/${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.*
          retention-days: 7

  release:
    name: Create GitHub Pre-release
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd release-artifacts
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ inputs.branch }}
          name: Pre-release ${{ needs.prepare.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
