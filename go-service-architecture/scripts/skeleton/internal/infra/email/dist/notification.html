<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <table style="width: 100%;" cellpadding="0" cellspacing="0" role="none">
    <tr>
      <td style="background-color: #1a1a2e; padding: 24px;">
        <h1 style="margin: 0; font-size: 24px; font-weight: 700; color: #eaeaea;">Notifier</h1>
      </td>
    </tr>
    <tr>
      <td style="background-color: #16213e; padding: 24px;">
        <p style="margin: 0 0 16px; font-size: 16px; color: #eaeaea;">
          Hello,
        </p>
        <p style="margin: 0 0 16px; font-size: 16px; color: #eaeaea;">
          A notification has been sent to <strong>{{ .Email }}</strong>.
        </p>
        <p style="margin: 0 0 16px; font-size: 16px; color: #eaeaea;">
          Notification ID: <code>{{ .ID }}</code>
        </p>
      </td>
    </tr>
    <tr>
      <td style="background-color: #1a1a2e; padding: 16px;">
        <p style="margin: 0; text-align: center; font-size: 12px; color: #eaeaea;">
          Sent by Notifier &bull; Request {{ .RequestID }}
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
